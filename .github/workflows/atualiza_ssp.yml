name: Atualiza dados SSP-SP

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  baixar-ssp:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: Executar download e normalização
        run: python -u baixar_ssp.py --force
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit e push dos arquivos atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "data/Veículos Roubados/"
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos arquivos — nada para commitar."
          else
            git commit -m "🤖 Atualização mensal SSP-SP ($(date +'%d/%m/%Y'))"
            git push
          fi
